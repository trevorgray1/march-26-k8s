apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app
  labels:
    app: example-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: example-app
  template:
    metadata:
      labels:
        app: example-app
    spec:
      serviceAccountName: example-app
      containers:
        - name: example-app
          image: <YOUR_ECR_IMAGE>:latest # TODO: Set your ECR image
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: example-app-config
