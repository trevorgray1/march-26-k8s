apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: example-clusterissuer
spec:
  acme:
    email: <YOUR-EMAIL>
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: example-clusterissuer-account-key
    solvers:
      - http01:
          ingress:
            class: alb
