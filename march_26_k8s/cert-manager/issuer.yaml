apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: example-issuer
  namespace: cert-manager
spec:
  acme:
    email: <YOUR-EMAIL>
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: example-issuer-account-key
    solvers:
      - http01:
          ingress:
            class: alb
